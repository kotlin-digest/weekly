<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About & Contributing — Kotlin Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=JetBrains+Mono:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script>if(document.cookie.includes('kd_night=1'))document.documentElement.dataset.night='1';</script>
  <style>
    html[data-night="1"] {
      --paper:     #1C1A17;
      --ink:       #E8E2D6;
      --ink-mid:   #C4BDB0;
      --ink-muted: #7A7266;
      --rule:      #3A3630;
      --chip-bg:   #2A2820;
      --accent:    #D4621A;
      --blue:      #6B9FD4;
      --green:     #5A9E78;
      --code-bg:   #111010;
    }
    html[data-night="1"] .top-nav { background: #0F0E0C; }
    html[data-night="1"] .philosophy-callout { background: #2A2218; }
    html[data-night="1"] .philosophy-callout p { color: #E8E2D6; }

    .night-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem; font-weight: 600; letter-spacing: 0.08em;
      padding: 0.2rem 0.55rem; border-radius: 3px;
      border: 1px solid #3A3830; background: transparent; color: #8B8070;
      cursor: pointer; margin-left: auto;
    }
    .night-btn:hover { color: #C8C0B0; border-color: #6B6457; }

    :root {
      --paper:      #F3EDE2;
      --ink:        #1C1B18;
      --ink-mid:    #3A3830;
      --ink-muted:  #6B6457;
      --rule:       #C9BFB0;
      --chip-bg:    #E5DDD0;
      --accent:     #C94F0C;
      --blue:       #1A4A8C;
      --green:      #2A6049;
      --code-bg:    #18171A;
      --code-text:  #D4CFC6;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Lora', Georgia, serif;
    }

    /* ── TOP NAV ── */
    .top-nav {
      background: var(--ink);
      padding: 0.6rem 2.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-back {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--chip-bg);
      text-decoration: none;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      opacity: 0.75;
      transition: opacity 0.15s;
    }
    .nav-back:hover { opacity: 1; }
    .nav-sep {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      color: #4A4840;
    }
    .nav-current {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--accent);
      letter-spacing: 0.06em;
    }

    /* ── MASTHEAD ── */
    .masthead {
      padding: 2rem 2.5rem 1.5rem;
      border-bottom: 3px double var(--ink);
    }
    .masthead-wordmark {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .masthead-sub {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--ink-muted);
      margin-top: 0.5rem;
    }
    .masthead-rule {
      margin-top: 1rem;
      border: none;
      border-top: 1px solid var(--rule);
    }

    /* ── LOADING ── */
    #loading {
      text-align: center;
      padding: 5rem 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
    }
    .loading-dot {
      display: inline-block;
      animation: blink 1.2s step-start infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── CONTENT WRAPPER ── */
    .content {
      max-width: 740px;
      margin: 0 auto;
      padding: 3rem 2.5rem 6rem;
      animation: fade-up 0.5s ease both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RENDERED MARKDOWN ── */

    /* h1 — treated as a chapter label, not repeated (masthead has it) */
    .content h1 {
      display: none;
    }

    /* h2 — section headers */
    .content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 700;
      font-style: italic;
      line-height: 1.2;
      margin-top: 3.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.45rem;
      border-bottom: 2px solid var(--ink);
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }
    .content h2::before {
      content: '§';
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-style: normal;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.1em;
      flex-shrink: 0;
    }

    /* h3 — sub-section labels */
    .content h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 2rem;
      margin-bottom: 0.6rem;
    }

    /* paragraphs */
    .content p {
      font-family: 'Lora', serif;
      font-size: 1rem;
      line-height: 1.8;
      color: var(--ink-mid);
      margin-bottom: 1.1rem;
      max-width: 65ch;
    }

    /* the manifesto gets a callout treatment — h2 "Editorial philosophy" section */
    .content .manifesto-block p {
      font-size: 1.05rem;
      color: var(--ink);
    }

    /* bold */
    .content strong {
      font-weight: 600;
      color: var(--ink);
    }

    /* emphasis */
    .content em {
      font-style: italic;
    }

    /* horizontal rule */
    .content hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2.5rem 0;
    }

    /* links */
    .content a {
      color: var(--blue);
      text-decoration: none;
    }
    .content a:hover { text-decoration: underline; }

    /* inline code */
    .content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78em;
      background: var(--chip-bg);
      padding: 0.1em 0.35em;
      border-radius: 2px;
      color: var(--accent-dim, #8B3608);
    }

    /* code blocks */
    .content pre {
      background: var(--code-bg);
      border-radius: 5px;
      padding: 1rem 1.25rem;
      margin: 1rem 0 1.5rem;
      overflow-x: auto;
    }
    .content pre code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      line-height: 1.6;
      color: var(--code-text);
      background: none;
      padding: 0;
      border-radius: 0;
    }

    /* lists */
    .content ul, .content ol {
      margin: 0.75rem 0 1.1rem 1.5rem;
    }
    .content li {
      font-family: 'Lora', serif;
      font-size: 1rem;
      line-height: 1.75;
      color: var(--ink-mid);
      margin-bottom: 0.3rem;
    }
    .content li::marker {
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75em;
    }
    .content ul li::marker { content: '▸  '; }

    /* blockquotes (if any) */
    .content blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 1.25rem;
      margin: 1rem 0;
      color: var(--ink-muted);
      font-style: italic;
    }

    /* special treatment for the philosophy section */
    .philosophy-callout {
      background: #EDE7DA;
      border-left: 3px solid var(--accent);
      padding: 1.5rem 2rem;
      margin: 1.5rem -0.5rem;
      border-radius: 0 4px 4px 0;
    }
    .philosophy-callout p {
      font-size: 1.05rem;
      color: var(--ink);
      max-width: none;
    }
    .philosophy-callout p:last-child { margin-bottom: 0; }

    /* ── FOOTER ── */
    footer {
      border-top: 2px solid var(--ink);
      padding: 1.25rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--ink-muted);
    }
    footer a { color: var(--blue); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .top-nav, .masthead, .content, footer { padding-left: 1.25rem; padding-right: 1.25rem; }
    }
  </style>
</head>
<body>

<!-- BACK NAV -->
<nav class="top-nav">
  <a href="index.html" class="nav-back">← Kotlin Digest</a>
  <span class="nav-sep">/</span>
  <span class="nav-current">ABOUT & CONTRIBUTING</span>
  <button class="night-btn" id="nightBtn" onclick="toggleNight()">☾ night</button>
</nav>

<!-- MASTHEAD -->
<header class="masthead">
  <h1 class="masthead-wordmark">Kotlin Digest</h1>
  <p class="masthead-sub">About this project &amp; how to contribute</p>
  <hr class="masthead-rule">
</header>

<!-- CONTENT -->
<div id="loading">
  Fetching<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
</div>
<div class="content" id="content" style="display:none"></div>

<!-- FOOTER -->
<footer>
  <span>Kotlin Digest · Open Source</span>
  <span>
    <a href="https://github.com/cicerohellmann/kotlin-digest">GitHub</a> ·
    <a href="./README.md">Raw README</a>
  </span>
</footer>

<script>
const README_URL = './README.md';

// Minimal markdown → HTML renderer, styled for our aesthetic
function parseMarkdown(md) {
  // Process line by line for block elements
  const lines = md.split('\n');
  let html = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // Fenced code block
    if (line.startsWith('```')) {
      const lang = line.slice(3).trim();
      let code = '';
      i++;
      while (i < lines.length && !lines[i].startsWith('```')) {
        code += lines[i] + '\n';
        i++;
      }
      html += `<pre><code class="lang-${lang}">${escHtml(code.trimEnd())}</code></pre>`;
      i++;
      continue;
    }

    // HR
    if (/^---+\s*$/.test(line)) {
      html += '<hr>';
      i++;
      continue;
    }

    // Headings
    if (line.startsWith('### ')) {
      html += `<h3>${inline(line.slice(4))}</h3>`;
      i++; continue;
    }
    if (line.startsWith('## ')) {
      html += `<h2>${inline(line.slice(3))}</h2>`;
      i++; continue;
    }
    if (line.startsWith('# ')) {
      html += `<h1>${inline(line.slice(2))}</h1>`;
      i++; continue;
    }

    // Unordered list
    if (/^[-*+] /.test(line)) {
      html += '<ul>';
      while (i < lines.length && /^[-*+] /.test(lines[i])) {
        html += `<li>${inline(lines[i].slice(2))}</li>`;
        i++;
      }
      html += '</ul>';
      continue;
    }

    // Ordered list
    if (/^\d+\. /.test(line)) {
      html += '<ol>';
      while (i < lines.length && /^\d+\. /.test(lines[i])) {
        html += `<li>${inline(lines[i].replace(/^\d+\.\s/, ''))}</li>`;
        i++;
      }
      html += '</ol>';
      continue;
    }

    // Blockquote
    if (line.startsWith('> ')) {
      html += '<blockquote>';
      while (i < lines.length && lines[i].startsWith('> ')) {
        html += `<p>${inline(lines[i].slice(2))}</p>`;
        i++;
      }
      html += '</blockquote>';
      continue;
    }

    // Blank line
    if (line.trim() === '') {
      i++;
      continue;
    }

    // Paragraph — collect until blank line
    let para = '';
    while (i < lines.length && lines[i].trim() !== '' &&
           !lines[i].startsWith('#') && !lines[i].startsWith('```') &&
           !lines[i].startsWith('---') && !/^[-*+] /.test(lines[i]) &&
           !/^\d+\. /.test(lines[i]) && !lines[i].startsWith('> ')) {
      para += (para ? ' ' : '') + lines[i];
      i++;
    }
    if (para) html += `<p>${inline(para)}</p>`;
  }

  return html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function inline(s) {
  return s
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic (not already in bold)
    .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
    // Em dashes
    .replace(/---/g, '&mdash;')
    // En dashes
    .replace(/--/g, '&ndash;');
}

// After rendering, wrap the editorial philosophy section in the callout
function applyCallout(container) {
  const headers = container.querySelectorAll('h2');
  headers.forEach(h2 => {
    if (h2.textContent.includes('Editorial philosophy')) {
      // Wrap subsequent p tags until next h2/h3
      const wrap = document.createElement('div');
      wrap.className = 'philosophy-callout';
      let next = h2.nextElementSibling;
      while (next && next.tagName !== 'H2' && next.tagName !== 'H3' && next.tagName !== 'HR') {
        const after = next.nextElementSibling;
        wrap.appendChild(next);
        next = after;
      }
      h2.insertAdjacentElement('afterend', wrap);
    }
  });
}

async function load() {
  try {
    const res = await fetch(README_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();

    const content = document.getElementById('content');
    content.innerHTML = parseMarkdown(md);
    applyCallout(content);

    document.getElementById('loading').style.display = 'none';
    content.style.display = 'block';
  } catch (err) {
    document.getElementById('loading').innerHTML =
      `<p style="color:var(--accent)">Couldn't fetch README.</p>
       <p style="margin-top:0.5rem"><a href="https://github.com/cicerohellmann/kotlin-digest/blob/main/README.md">Read it on GitHub →</a></p>`;
  }
}

load();

function toggleNight() {
  const next = document.documentElement.dataset.night === '1' ? '0' : '1';
  document.documentElement.dataset.night = next;
  document.cookie = `kd_night=${next};max-age=${60*60*24*90};path=/`;
  document.getElementById('nightBtn').textContent = next === '1' ? '☀ day' : '☾ night';
}
if (document.documentElement.dataset.night === '1')
  document.getElementById('nightBtn').textContent = '☀ day';
</script>
</body>
</html>
