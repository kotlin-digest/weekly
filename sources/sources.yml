# Android Digest — Source Registry
#
# Community PRs welcome — add your source, open a PR.
# See docs/sources.md for field definitions and ingestion strategy notes.
#
# EDITORIAL NOTE: No newsletter aggregators (Android Weekly, Kotlin Weekly, etc.).
# They are derivative — ingesting them would bias the topic bible toward what
# newsletter editors already curated, not what the community is actually talking about.
# Primary sources only.
#
# Required fields: id, name, url, type, cadence_days
# Optional fields: rss, atom, language, topics (editorial hints), notes

sources:

