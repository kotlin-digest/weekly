    language: en
    cadence_days: 21
    topics: [koin, di]

  - id: room-changelog
    name: "Room — Release Notes"
    url: "https://developer.android.com/jetpack/androidx/releases/room"
    type: changelog
    language: en
    cadence_days: 21
    topics: [room, database, jetpack]

