    type: changelog
    language: en
    cadence_days: 30
    topics: [hilt, di, jetpack]

  - id: koin-changelog
    name: "Koin — GitHub Releases"
    url: "https://github.com/InsertKoinIO/koin/releases"
    rss: "https://github.com/InsertKoinIO/koin/releases.atom"
