# Android Digest — Topic Bible Seed
#
# This file seeds the topic bible with a curated baseline.
# New topics auto-emerge from the pipeline (needs_review: true).
# PRs welcome to add, rename, or reorganize.

# Scoring constants (can be tuned)
scoring:
  decay_factor: 0.92          # daily multiplier — score halves in ~8 days without mentions
  source_weights:
    conference: 3.0
    blog: 2.0
    changelog: 2.5            # library releases are high-signal
    news: 1.5
    slack-mirror: 1.0
  emergence_threshold: 3      # auto-add a topic if it appears in N+ articles in one cycle

